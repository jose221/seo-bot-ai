<div class="login-wrap min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="login-card shadow-lg">

    <!-- Header -->
    <div class="login-card__header text-center">
      <div class="login-card__avatar">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h2 class="login-card__title mt-3">{{ 'login.title' | translate }}</h2>
      <p class="login-card__subtitle">{{ 'login.subtitle' | translate }}</p>
    </div>

    <!-- Error -->
    @if (error()) {
      <div class="alert alert-danger mx-4 mt-3 mb-0 d-flex gap-2 align-items-center">
        <i class="bi bi-x-circle-fill flex-shrink-0"></i>
        <span>{{ error() | translate }}</span>
      </div>
    }

    <div class="login-card__body">

      <!-- Selector de idioma -->
      <div class="d-flex justify-content-end mb-3">
        <app-language-selector />
      </div>

      <!-- Botón SSO Keycloak -->
      <button
        type="button"
        class="btn btn-primary w-100 login-btn"
        (click)="signIn()"
        [disabled]="loading()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ 'login.loading' | translate }}
        } @else {
          <i class="bi bi-box-arrow-in-right me-2"></i>{{ 'login.signInWithSso' | translate }}
        }
      </button>

    </div>
  </div>
</div>
