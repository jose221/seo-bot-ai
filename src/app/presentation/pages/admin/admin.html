<div class="app-shell admin-shell">
  <header class="admin-header">
    <div class="container-fluid admin-shell__container">
      <div class="admin-header__bar">
        <a class="admin-brand text-decoration-none" routerLink="/admin/target">
          <img class="admin-brand__logo" src="/assets/base/name_logo.svg" alt="SEO Bot AI" />
        </a>

        <nav class="admin-nav">
          <a
            class="admin-nav__link"
            routerLink="/admin/target"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            {{ 'admin.navbar.sites' | translate }}
          </a>
          <a
            class="admin-nav__link"
            routerLink="/admin/audit"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            {{ 'admin.navbar.audits' | translate }}
          </a>
          <a
            class="admin-nav__link"
            routerLink="/admin/audit/comparisons"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            {{ 'admin.navbar.comparisons' | translate }}
          </a>
          <a
            class="admin-nav__link"
            routerLink="/admin/audit/schemas"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            {{ 'admin.navbar.schemas' | translate }}
          </a>
          <a
            class="admin-nav__link"
            routerLink="/admin/audit/url-validations"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            {{ 'admin.navbar.urlValidations' | translate }}
          </a>
          <a
            class="admin-nav__link"
            routerLink="/admin/json-tools"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            {{ 'admin.navbar.jsonTools' | translate }}
          </a>
        </nav>

        <div class="admin-header__actions">
          <button class="btn btn-outline-danger admin-logout" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>
            <span>{{ 'admin.navbar.logout' | translate }}</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container-fluid admin-shell__container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
